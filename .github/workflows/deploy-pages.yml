name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout publish repo
        uses: actions/checkout@v5

      - name: Checkout baby-future
        uses: actions/checkout@v5
        with:
          repository: ijaa/baby-future
          path: repos/baby-future
          token: ${{ secrets.PAGES_REPO_TOKEN }}

      - name: Checkout image-story
        uses: actions/checkout@v5
        with:
          repository: ijaa/image-story
          path: repos/image-story
          token: ${{ secrets.PAGES_REPO_TOKEN }}

      - name: Checkout gpt-image-gen
        uses: actions/checkout@v5
        with:
          repository: ijaa/gpt-image-gen
          path: repos/gpt-image-gen
          token: ${{ secrets.PAGES_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            repos/baby-future/package-lock.json
            repos/image-story/package-lock.json
            repos/gpt-image-gen/package-lock.json

      - name: Install publish repo deps
        run: npm ci

      - name: Build aggregated site
        run: npm run build
        env:
          BABY_FUTURE_DIR: repos/baby-future
          IMAGE_STORY_DIR: repos/image-story
          GPT_IMAGE_GEN_DIR: repos/gpt-image-gen

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
